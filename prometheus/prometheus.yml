global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: fastapi
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets:
          - api:8443
    tls_config:
      ca_file: /etc/prometheus/certs/ca.crt
      server_name: api

  - job_name: event-audit-consumer
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets:
          - event-consumer:9443
    tls_config:
      ca_file: /etc/prometheus/certs/ca.crt
      server_name: event-consumer

  - job_name: chat-history-consumer
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets:
          - chat-history-consumer:9443
    tls_config:
      ca_file: /etc/prometheus/certs/ca.crt
      server_name: chat-history-consumer

  - job_name: moderation-consumer
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets:
          - moderation-consumer:9443
    tls_config:
      ca_file: /etc/prometheus/certs/ca.crt
      server_name: moderation-consumer
